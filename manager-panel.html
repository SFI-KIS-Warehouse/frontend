<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель менеджера - Aboba Warehouse</title>
    <link rel="stylesheet" href="css/manager-panel.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">Aboba Warehouse</div>
        <div class="navbar-menu">
            <span id="userName">Пользователь</span>
            <button id="logoutBtn" class="logout-button">🚪 Выйти</button>
        </div>
    </nav>

    <div class="manager-container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="providers">🏢 Поставщики</button>
            <button class="tab-btn" data-tab="units">⚖️ Единицы</button>
            <button class="tab-btn" data-tab="products">📦 Товары</button>
            <button class="tab-btn" data-tab="contracts">📄 Договоры</button>
        </div>

        <!-- Вкладка Поставщики -->
        <div id="providersTab" class="tab-content active">
            <div class="tab-header">
                <h2>Управление поставщиками</h2>
                <button class="btn btn-primary" onclick="showAddProviderModal()">➕ Добавить поставщика</button>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Наименование</th>
                            <th>ИНН</th>
                            <th>БИК</th>
                            <th>Расчетный счет</th>
                            <th>Директор</th>
                            <th>Бухгалтер</th>
                        </tr>
                    </thead>
                    <tbody id="providersTableBody">
                        <tr><td colspan="7" class="loading">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Вкладка Единицы -->
        <div id="unitsTab" class="tab-content">
            <div class="tab-header">
                <h2>Единицы измерения</h2>
                <button class="btn btn-primary" onclick="showAddUnitModal()">➕ Добавить единицу</button>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Наименование</th>
                        </tr>
                    </thead>
                    <tbody id="unitsTableBody">
                        <tr><td colspan="2" class="loading">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Вкладка Товары -->
        <div id="productsTab" class="tab-content">
            <div class="tab-header">
                <h2>Товары</h2>
                <button class="btn btn-primary" onclick="showAddProductModal()">➕ Добавить товар</button>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Наименование</th>
                            <th>Ед. изм.</th>
                            <th>Критический остаток</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <tr><td colspan="4" class="loading">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Вкладка Договоры -->
        <div id="contractsTab" class="tab-content">
            <div class="tab-header">
                <h2>Договоры</h2>
                <button class="btn btn-primary" onclick="showAddContractModal()">➕ Создать договор</button>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Поставщик</th>
                            <th>Статус</th>
                            <th>Товаров</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="contractsTableBody">
                        <tr><td colspan="5" class="loading">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/manager-panel.js"></script>
</body>
</html>

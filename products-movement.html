<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товары и движения - Aboba Warehouse</title>
    <link rel="stylesheet" href="css/products-movement.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">Aboba Warehouse</div>
        <div class="navbar-menu">
            <span id="userName">Пользователь</span>
            <button id="logoutBtn" class="logout-button">🚪 Выйти</button>
        </div>
    </nav>

    <div class="products-container">
        <div class="products-header">
            <div>
                <h1>📦 Товары и движения</h1>
                <p>Управление товарами и операциями на складе</p>
            </div>
            <div class="quick-actions">
                <button class="quick-action-btn income" onclick="openIncomeModal()">➕ Приход товара</button>
                <button class="quick-action-btn outcome" onclick="openOutcomeModal()">➖ Расход товара</button>
            </div>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск товаров...">
            <select id="filterSelect" class="filter-select">
                <option value="all">Все товары</option>
                <option value="critical">Критический остаток</option>
                <option value="in-stock">В наличии</option>
                <option value="out-of-stock">Нет в наличии</option>
            </select>
        </div>

        <div class="products-table">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Наименование</th>
                        <th>Ед. изм.</th>
                        <th>Статус</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <tr>
                        <td colspan="4" class="loading">Загрузка...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/products-movement.js"></script>
</body>
</html>
